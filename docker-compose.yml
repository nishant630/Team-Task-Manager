version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: taskflow-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskflow-network

  backend:
    build: ./backend
    container_name: taskflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/taskflow
      - JWT_SECRET=yoursecretjwtkeyhere12345!
      - NODE_ENV=development
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - taskflow-network

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - taskflow-network

volumes:
  mongo-data:

networks:
  taskflow-network:
    driver: bridge
